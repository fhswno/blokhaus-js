name: Docs CI

on:
  push:
    branches: [main]
    paths:
      - "apps/docs/**"
  pull_request:
    branches: [main]
    paths:
      - "apps/docs/**"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint
        working-directory: apps/docs

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run format:check
        working-directory: apps/docs

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, format]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
        working-directory: apps/docs
      - run: bun run build
        working-directory: apps/docs
